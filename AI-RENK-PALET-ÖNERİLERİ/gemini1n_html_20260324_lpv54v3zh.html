<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palet 1: Derin Çelik & Turuncu</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0B1120] text-[#F8FAFC] font-sans antialiased p-8">

    <div class="max-w-4xl mx-auto mt-12">
        <header class="mb-12 border-b border-[#1E293B] pb-6 flex justify-between items-center">
            <div class="text-2xl font-bold tracking-tight">TaşYünü<span class="text-[#94A3B8] font-light">Sistemleri</span></div>
            <nav class="text-[#94A3B8] text-sm space-x-6">
                <a href="#" class="hover:text-white transition">Ürünler</a>
                <a href="#" class="hover:text-white transition">Lojistik</a>
            </nav>
        </header>

        <main class="grid grid-cols-1 md:grid-cols-2 gap-12 items-center">
            <div>
                <span class="text-[#FF5A00] text-sm font-semibold tracking-wider uppercase mb-2 block">TIR Bazlı Teslimat</span>
                <h1 class="text-5xl font-extrabold leading-tight mb-6">Maksimum Yalıtım,<br>Minimum Maliyet.</h1>
                <p class="text-[#94A3B8] text-lg mb-8 leading-relaxed">
                    Kamyon ve TIR bazlı alımlarda bölgenize özel iskontolarla anında resmi teklifinizi oluşturun.
                </p>
                <button class="bg-[#FF5A00] hover:bg-[#E65000] text-white font-bold py-4 px-8 rounded-lg shadow-[0_4px_14px_0_rgba(255,90,0,0.39)] transition-all transform hover:scale-105">
                    Anında Teklif Oluştur &rarr;
                </button>
            </div>
            
            <div class="bg-[#1E293B] p-8 rounded-2xl border border-gray-700/50 shadow-2xl">
                <div class="flex items-center justify-between mb-6">
                    <h3 class="text-xl font-semibold">Dalmaçyalı SW035</h3>
                    <span class="bg-[#0B1120] text-[#94A3B8] px-3 py-1 rounded text-sm">5 cm</span>
                </div>
                <div class="space-y-4 mb-8">
                    <div class="flex justify-between border-b border-gray-700 pb-2">
                        <span class="text-[#94A3B8]">TIR İskontosu</span>
                        <span class="font-bold text-green-400">%18 Uygulandı</span>
                    </div>
                    <div class="flex items-end justify-between">
                        <span class="text-[#94A3B8]">m² Fiyatı</span>
                        <span class="text-3xl font-bold">₺326,42</span>
                    </div>
                </div>
                <button class="w-full bg-[#0B1120] hover:bg-gray-800 text-white font-medium py-3 rounded-lg border border-gray-600 transition">
                    Kataloğu İncele
                </button>
            </div>
        </main>
    </div>

</body>
</html>
